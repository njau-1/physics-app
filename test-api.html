<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智谱AI API 测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      font-size: 22px;
    }
    .info {
      background: #fff3e0;
      border-left: 4px solid #ff9800;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 13px;
    }
    .test-section {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .test-section h3 {
      font-size: 14px;
      color: #333;
      margin-bottom: 10px;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: 500;
      font-size: 14px;
    }
    .status.testing { background: #e3f2fd; color: #1976d2; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #ffebee; color: #c62828; }
    .result {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.5;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary { background: #4A90E2; color: white; }
    .btn-primary:hover { background: #357abd; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover { background: #d0d0d0; }
    .btn-success { background: #4caf50; color: white; }
    .btn-success:hover { background: #388e3c; }
    .api-info {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔬 物理探秘 - API全面测试</h1>
    
    <div class="info">
      <strong>⚠️ 安全提醒：</strong> 测试完成后，建议删除此测试文件。API Key 已保存在浏览器本地存储中。
    </div>
    
    <!-- 视觉模型测试 -->
    <div class="test-section">
      <h3>📷 1. 视觉模型测试 (GLM-4V-Flash)</h3>
      <div id="vision-status" class="status testing">准备测试...</div>
      <div id="vision-result" class="result" style="display:none;"></div>
      <button class="btn-primary" onclick="testVision()">🚀 测试视觉识别</button>
    </div>
    
    <!-- 文本对话测试 -->
    <div class="test-section">
      <h3>💬 2. 文本对话测试 (GLM-4)</h3>
      <div id="chat-status" class="status testing">准备测试...</div>
      <div id="chat-result" class="result" style="display:none;"></div>
      <button class="btn-success" onclick="testChat()">🚀 测试智能问答</button>
    </div>
    
    <div class="btn-group">
      <button class="btn-secondary" onclick="openApp()">📱 打开应用</button>
      <button class="btn-secondary" onclick="clearStorage()">🗑️ 清除存储</button>
    </div>
    
    <div class="api-info">
      <strong>API配置信息：</strong><br>
      - 模型1: glm-4v-flash (视觉识别)<br>
      - 模型2: glm-4 (文本对话)<br>
      - API地址: open.bigmodel.cn
    </div>
  </div>

  <script src="zhipu-ai.js"></script>
  <script src="zhipu-chat.js"></script>
  <script>
    const API_KEY = '5e4db2dc830548378c58406d638ede83.85TyOpgBUfVpzoYK';
    
    function updateStatus(id, message, type) {
      const el = document.getElementById(id);
      el.textContent = message;
      el.className = 'status ' + type;
    }
    
    function showResult(id, content) {
      const el = document.getElementById(id);
      el.style.display = 'block';
      el.textContent = content;
    }
    
    // 测试视觉模型
    async function testVision() {
      updateStatus('vision-status', '⏳ 正在测试视觉模型...', 'testing');
      document.getElementById('vision-result').style.display = 'none';
      
      try {
        saveZhipuApiKey(API_KEY);
        
        const testImage = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';
        
        const result = await recognizeWithZhipuAI(
          testImage,
          '请简短回复"视觉模型测试成功"，只需要回复这句话。',
          'base64'
        );
        
        updateStatus('vision-status', '✅ 视觉模型测试成功！', 'success');
        showResult('vision-result', result);
        
      } catch (error) {
        updateStatus('vision-status', '❌ 视觉模型测试失败', 'error');
        showResult('vision-result', error.message || String(error));
      }
    }
    
    // 测试文本对话
    async function testChat() {
      updateStatus('chat-status', '⏳ 正在测试文本对话...', 'testing');
      document.getElementById('chat-result').style.display = 'none';
      
      try {
        initZhipuChatApiKey();
        ZhipuChatConfig.apiKey = API_KEY;
        
        const result = await chatWithZhipuAI(
          '请简短回复"文本对话测试成功"，只需要回复这句话。',
          [],
          (status) => updateStatus('chat-status', '⏳ ' + status, 'testing')
        );
        
        updateStatus('chat-status', '✅ 文本对话测试成功！', 'success');
        showResult('chat-result', result);
        
      } catch (error) {
        updateStatus('chat-status', '❌ 文本对话测试失败', 'error');
        showResult('chat-result', error.message || String(error));
      }
    }
    
    function openApp() {
      window.location.href = 'index.html';
    }
    
    function clearStorage() {
      localStorage.removeItem('zhipu_api_key');
      localStorage.removeItem('zhipu_chat_api_key');
      alert('已清除所有API Key存储');
      location.reload();
    }
    
    // 页面加载时自动运行测试
    window.onload = function() {
      // 自动保存API Key
      saveZhipuApiKey(API_KEY);
      initZhipuChatApiKey();
      ZhipuChatConfig.apiKey = API_KEY;
      
      // 自动运行视觉模型测试
      testVision();
    };
  </script>
</body>
</html>
